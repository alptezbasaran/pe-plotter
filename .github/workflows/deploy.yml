name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install

      - name: Bundle scenario files into public/
        run: |
          mkdir -p public
          for f in *.txt; do [ -f "$f" ] && cp "$f" "public/$f"; done
          ls public/*.txt 2>/dev/null | sed 's|^public/||' | sort > /tmp/list.txt
          printf '[\n' > public/files.json
          first=1; while IFS= read -r name; do
            [ "$first" = 1 ] && first=0 || printf ',\n' >> public/files.json
            printf '  "%s"' "$name" >> public/files.json
          done < /tmp/list.txt
          printf '\n]\n' >> public/files.json

      - run: npm run build
        env:
          VITE_BASE_URL: /pe-plotter/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
